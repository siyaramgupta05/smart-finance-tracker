services:
  db:
    image: mysql:8.0
    container_name: finance-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: personal_finance_db
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: smart-finance-backend:v1
    ports:
      - "8082:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/personal_finance_db?allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: smart-finance-frontend:v1
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
